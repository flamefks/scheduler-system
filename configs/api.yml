http:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 5s

database:
  url: "${DATABASE_URL}"
  max_connections: 10
  min_connections: 2
  max_connection_lifetime: 1h
  min_connection_lifetime: 15m
  healthcheck_period: 1m

otel:
  endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
  metrics:
    enable: true
