nats:
  url: "nats://nats:4222"

database:
  dsn: "postgres://scheduler:scheduler@postgres:5432/scheduler_db?sslmode=disable"
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 1h
  max_conn_idle_time: 15m
  health_check_period: 1m

http_retry:
  max_attempts: 5
  base_delay: 5s 
  max_delay: 2m 
  back_off: exponential
  retry_on_status: [408, 429, 500, 502, 503, 504]
  retry_on_error: true 
