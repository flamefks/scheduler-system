version: "2"

sql:
  - engine: "postgresql"
    schema: "sql/migrations"
    queries: "sql/queries"
    gen:
      go:
        package: "db"
        out: "internal/postgres/queries"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        emit_empty_slices: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
            
          - db_type: "timestamptz"
            go_type: "time.Time"

          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          
          -  db_type: "pg_catalog.interval"
             go_type: "time.Duration"
