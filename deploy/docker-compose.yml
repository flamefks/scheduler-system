x-app-env: &app-env
  env_file:
    - ../.env

x-app-build: &app-build
  context: ..
  dockerfile: ./deploy/Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler}
      POSTGRES_DB: ${POSTGRES_DB:-scheduler_db}
    volumes:
      - scheduler_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-migrate:
    <<: *app-env
    build:
      <<: *app-build
      args:
        CMD_PATH: ./cmd/postgres-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../sql/migrations:/app/sql/migrations:ro
    restart: "no"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - scheduler_nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats-init:
    <<: *app-env
    build:
      <<: *app-build
      args:
        CMD_PATH: ./cmd/nats-init
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ../configs/nats-init.yml:/app/config/core.yml:ro
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "9464:9464"
    depends_on:
      jaeger:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - scheduler_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  api:
    <<: *app-env
    build:
      <<: *app-build
      args:
        CMD_PATH: ./cmd/api
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ../configs/api.yml:/app/config/core.yml:ro
      - ../configs/logging.yml:/app/config/logging.yml:ro
      - ../logs/api:/app/logs

volumes:
  scheduler_pg_data:
  scheduler_nats_data:
  scheduler_prometheus_data:
